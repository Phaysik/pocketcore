# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
#
# ******** NOTE ********
# We have attempted to detect the languages in your repository. Please check
# the `language` matrix defined below to confirm you have the correct set of
# supported CodeQL languages.
#
name: 'CodeQL'

on:
  push:
    branches-ignore: [main]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [main]
  schedule:
    - cron: '15 8 * * 6'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['cpp']
        # CodeQL supports [ 'cpp', 'csharp', 'go', 'java', 'javascript', 'python' ]
        # Learn more:
        # https://docs.github.com/en/free-pro-team@latest/github/finding-security-vulnerabilities-and-errors-in-your-code/configuring-code-scanning#changing-the-languages-that-are-analyzed

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # If you wish to specify custom queries, you can do so here or in a config file.
          # By default, queries listed here will override any specified in a config file.
          # Prefix the list here with "+" to use these queries and those in the config file.
          # queries: ./path/to/local/query, your-org/your-repo/queries@main

      # Autobuild attempts to build any compiled languages  (C/C++, C#, or Java).
      # If this step fails, then you should remove it and run the build manually (see below)
      # - name: Autobuild
      #   uses: github/codeql-action/autobuild@v2

      - name: Set up Cache Site
        run: mkdir -p ./cache

      - name: Set up Apt Cache Site
        run: |
          mkdir -p ./cache/apt-packages
          mkdir -p ./cache/apt-lists

      - name: Set up Google Test Cache Site
        run: |
          mkdir -p ./cache/gtest/lib
          mkdir -p ./cache/gtest/include

      - name: Set up Config Cat Cache Site
        run: |
          mkdir -p ./cache/configcat/lib
          mkdir -p ./cache/configcat/include

      - name: Set up Curl Cache Site
        run: |
          mkdir -p ./cache/curl/lib
          mkdir -p ./cache/curl/include

      - name: Set up Hash Library Cache Site
        run: |
          mkdir -p ./cache/hash-library/lib
          mkdir -p ./cache/hash-library/include

      - name: Set up GCC Cache Site
        run: |
          mkdir -p ./cache/gcc-latest

      - name: Cache Apt Packages
        id: cache-apt-packages
        uses: actions/cache@v5
        with:
          path: ./cache/apt-packages
          key: ${{ runner.os }}-apt-packages-${{ hashFiles('makefileDependencies.sh') }}
          restore-keys: |
            ${{ runner.os }}-apt-packages-

      - name: Cache Apt Package Lists
        id: cache-apt-lists
        uses: actions/cache@v5
        with:
          path: ./cache/apt-lists
          key: ${{ runner.os }}-apt-lists-${{ hashFiles('makefileDependencies.sh') }}
          restore-keys: |
            ${{ runner.os }}-apt-lists-

      - name: Cache Google Test
        id: cache-google-tests
        uses: actions/cache@v5
        with:
          path: |
            ./cache/gtest
          key: ${{ runner.os }}-google-tests-${{ hashFiles('makefileDependencies.sh') }}
          restore-keys: |
            ${{ runner.os }}-google-tests-

      - name: Cache Config Cat
        id: cache-config-cat
        uses: actions/cache@v5
        with:
          path: |
            ./cache/configcat
          key: ${{ runner.os }}-config-cat-${{ hashFiles('makefileDependencies.sh') }}
          restore-keys: |
            ${{ runner.os }}-config-cat-

      - name: Cache Curl
        id: cache-curl
        uses: actions/cache@v5
        with:
          path: |
            ./cache/curl
          key: ${{ runner.os }}-curl-${{ hashFiles('makefileDependencies.sh') }}
          restore-keys: |
            ${{ runner.os }}-curl-

      - name: Cache Hash Library
        id: cache-hash-library
        uses: actions/cache@v5
        with:
          path: |
            ./cache/hash-library
          key: ${{ runner.os }}-hash-library-${{ hashFiles('makefileDependencies.sh') }}
          restore-keys: |
            ${{ runner.os }}-hash-library-

      - name: Cache GCC
        id: cache-gcc-latest
        uses: actions/cache@v5
        with:
          path: |
            ./cache/gcc-latest
          key: ${{ runner.os }}-gcc-latest-${{ hashFiles('makefileDependencies.sh') }}
          restore-keys: |
            ${{ runner.os }}-gcc-latest-

      - name: Install Apt Packages From Cache
        if: steps.cache-apt-packages.outputs.cache-hit == 'true'
        run: sudo cp -r ./cache/apt-packages/* /var/cache/apt

      - name: Install Apt Lists From Cache
        if: steps.cache-apt-lists.outputs.cache-hit == 'true'
        run: sudo cp -r ./cache/apt-lists/* /var/lib/apt/lists

      - name: Install Google Test From Cache
        if: steps.cache-google-tests.outputs.cache-hit == 'true'
        run: |
          sudo cp -r ./cache/gtest/lib/* /usr/lib
          sudo mkdir -p /usr/include/gtest
          sudo cp -r ./cache/gtest/include/* /usr/include/gtest

      - name: Install Config Cat From Cache
        if: steps.cache-config-cat.outputs.cache-hit == 'true'
        run: |
          sudo cp ./cache/configcat/lib/* /usr/lib
          sudo mkdir -p /usr/include/configcat
          sudo cp ./cache/configcat/include/* /usr/include/configcat/

      - name: Install Curl From Cache
        if: steps.cache-curl.outputs.cache-hit == 'true'
        run: |
          sudo cp ./cache/curl/lib/* /usr/lib
          sudo mkdir -p /usr/include/curl
          sudo cp ./cache/curl/include/* /usr/include/curl/

      - name: Install Hash Library From Cache
        if: steps.cache-hash-library.outputs.cache-hit == 'true'
        run: |
          sudo cp ./cache/hash-library/lib/* /usr/lib
          sudo mkdir -p /usr/include/hash-library
          sudo cp ./cache/hash-library/include/* /usr/include/hash-library/

      - name: Install GCC From Cache
        if: steps.cache-gcc-latest.outputs.cache-hit == 'true'
        run: |
          sudo mkdir -p /usr/local/gcc-latest
          sudo cp -r ./cache/gcc-latest/* /usr/local/gcc-latest/
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/local/gcc-latest/bin/g++ 100
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/local/gcc-latest/bin/gcc 100
          sudo update-alternatives --install /usr/bin/gcov gcov /usr/local/gcc-latest/bin/gcov 100

      - name: Install dependencies
        if: steps.cache-apt-packages.outputs.cache-hit != 'true' || steps.cache-apt-lists.outputs.cache-hit != 'true' || steps.cache-google-tests.outputs.cache-hit != 'true' || steps.cache-config-cat.outputs.cache-hit != 'true' || steps.cache-curl.outputs.cache-hit != 'true' || steps.cache-hash-library.outputs.cache-hit != 'true' || steps.cache-gcc-latest.outputs.cache-hit != 'true'
        run: ./makefileDependencies.sh a

      - name: Install Google Mock
        if: steps.cache-apt-packages.outputs.cache-hit == 'true' || steps.cache-apt-lists.outputs.cache-hit == 'true' || steps.cache-google-tests.outputs.cache-hit == 'true' || steps.cache-config-cat.outputs.cache-hit == 'true' || steps.cache-curl.outputs.cache-hit == 'true' || steps.cache-hash-library.outputs.cache-hit == 'true' || steps.cache-gcc-latest.outputs.cache-hit == 'true'
        run: sudo apt-get install libgmock-dev -y

      - name: Make project
        run: make

      - name: Save Apt Packages Cache
        run: |
          sudo cp -r /var/cache/apt ./cache/apt-packages

      - name: Save Apt Lists Cache
        run: |
          sudo cp -r /var/lib/apt/lists ./cache/apt-lists

      - name: Save Google Test Cache
        run: |
          sudo cp -r /usr/lib/libgtest* ./cache/gtest/lib
          sudo cp -r /usr/include/gtest/* ./cache/gtest/include

      - name: Save Config Cat Cache
        run: |
          sudo cp /usr/lib/libconfigcat.a ./cache/configcat/lib
          sudo cp /usr/include/configcat/* ./cache/configcat/include

      - name: Save Curl Cache
        run: |
          sudo cp /usr/lib/libcurl.a ./cache/curl/lib
          sudo cp /usr/include/curl/* ./cache/curl/include

      - name: Save Hash Library Cache
        run: |
          sudo cp /usr/lib/libhash-library.a ./cache/hash-library/lib
          sudo cp /usr/include/hash-library/* ./cache/hash-library/include

      - name: Find latest GCC
        run: |
          latest_gcc=$(find /usr/local -maxdepth 1 -type d -name 'gcc-*' | sort -V | tail -n1)
          echo "LATEST_GCC=$latest_gcc" >> "$GITHUB_ENV"

      - name: Save GCC Cache
        run: |
          sudo cp -r "$LATEST_GCC"/* ./cache/gcc-latest

      - name: Give Read Access For Apt Folder
        run: sudo chown -R $USER:$USER ./cache/apt-packages/apt/archives/lock ./cache/apt-packages/apt/archives/partial ./cache/apt-lists/lists/lock ./cache/apt-lists/lists/partial

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
