# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
#
# ******** NOTE ********
# We have attempted to detect the languages in your repository. Please check
# the `language` matrix defined below to confirm you have the correct set of
# supported CodeQL languages.
#
name: 'CodeQL Advanced'

on:
  push:
    branches-ignore: [main]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [main]
  schedule:
    - cron: '15 8 * * 6'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Runner size impacts CodeQL analysis time. To learn more, please see:
    #   - https://gh.io/recommended-hardware-resources-for-running-codeql
    #   - https://gh.io/supported-runners-and-hardware-resources
    #   - https://gh.io/using-larger-runners (GitHub.com only)
    # Consider using larger runners or machines with greater resources for possible analysis time improvements.
    runs-on: ubuntu-latest
    permissions:
      # required for all workflows
      security-events: write

      # required to fetch internal or private CodeQL packs
      packages: read

      # only required for workflows in private repositories
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ['c-cpp']
        # CodeQL supports the following values keywords for 'language': $supported-codeql-languages
        # Use `c-cpp` to analyze code written in C, C++ or both
        # Use 'java-kotlin' to analyze code written in Java, Kotlin or both
        # Use 'javascript-typescript' to analyze code written in JavaScript, TypeScript or both
        # To learn more about changing the languages that are analyzed or customizing the build mode for your analysis,
        # see https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning.
        # If you are analyzing a compiled language, you can modify the 'build-mode' for that language to customize how
        # your codebase is analyzed, see https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/codeql-code-scanning-for-compiled-languages
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Cache Site
        run: mkdir -p ./cache

      - name: Set up Apt Cache Site
        run: |
          mkdir -p ./cache/apt-packages
          mkdir -p ./cache/apt-lists

      - name: Set up Google Test Cache Site
        run: |
          mkdir -p ./cache/gtest/lib
          mkdir -p ./cache/gtest/include

      - name: Set up Config Cat Cache Site
        run: |
          mkdir -p ./cache/configcat/lib
          mkdir -p ./cache/configcat/include

      - name: Set up Curl Cache Site
        run: |
          mkdir -p ./cache/curl/lib
          mkdir -p ./cache/curl/include

      - name: Set up Hash Library Cache Site
        run: |
          mkdir -p ./cache/hash-library/lib
          mkdir -p ./cache/hash-library/include

      - name: Set up Spdlog Cache Site
        run: |
          mkdir -p ./cache/spdlog/lib
          mkdir -p ./cache/spdlog/lib/cmake
          mkdir -p ./cache/spdlog/lib/pkgconfig
          mkdir -p ./cache/spdlog/include

      - name: Set up GCC Cache Site
        run: |
          mkdir -p ./cache/gcc-latest

      - name: Cache Apt Packages
        id: cache-apt-packages
        uses: actions/cache@v5
        with:
          path: ./cache/apt-packages
          key: ${{ runner.os }}-apt-packages-${{ hashFiles('makefileDependencies.sh') }}
          restore-keys: |
            ${{ runner.os }}-apt-packages-

      - name: Cache Apt Package Lists
        id: cache-apt-lists
        uses: actions/cache@v5
        with:
          path: ./cache/apt-lists
          key: ${{ runner.os }}-apt-lists-${{ hashFiles('makefileDependencies.sh') }}
          restore-keys: |
            ${{ runner.os }}-apt-lists-

      - name: Cache Google Test
        id: cache-google-tests
        uses: actions/cache@v5
        with:
          path: |
            ./cache/gtest
          key: ${{ runner.os }}-google-tests-${{ hashFiles('makefileDependencies.sh') }}
          restore-keys: |
            ${{ runner.os }}-google-tests-

      - name: Cache Config Cat
        id: cache-config-cat
        uses: actions/cache@v5
        with:
          path: |
            ./cache/configcat
          key: ${{ runner.os }}-config-cat-${{ hashFiles('makefileDependencies.sh') }}
          restore-keys: |
            ${{ runner.os }}-config-cat-

      - name: Cache Curl
        id: cache-curl
        uses: actions/cache@v5
        with:
          path: |
            ./cache/curl
          key: ${{ runner.os }}-curl-${{ hashFiles('makefileDependencies.sh') }}
          restore-keys: |
            ${{ runner.os }}-curl-

      - name: Cache Hash Library
        id: cache-hash-library
        uses: actions/cache@v5
        with:
          path: |
            ./cache/hash-library
          key: ${{ runner.os }}-hash-library-${{ hashFiles('makefileDependencies.sh') }}
          restore-keys: |
            ${{ runner.os }}-hash-library-

      - name: Cache Spdlog
        id: cache-spdlog
        uses: actions/cache@v5
        with:
          path: |
            ./cache/spdlog
          key: ${{ runner.os }}-spdlog-${{ hashFiles('makefileDependencies.sh') }}
          restore-keys: |
            ${{ runner.os }}-spdlog-

      - name: Cache GCC
        id: cache-gcc-latest
        uses: actions/cache@v5
        with:
          path: |
            ./cache/gcc-latest
          key: ${{ runner.os }}-gcc-latest-${{ hashFiles('makefileDependencies.sh') }}
          restore-keys: |
            ${{ runner.os }}-gcc-latest-

      - name: Install Apt Packages From Cache
        if: steps.cache-apt-packages.outputs.cache-hit == 'true'
        run: sudo cp -r ./cache/apt-packages/* /var/cache/apt

      - name: Install Apt Lists From Cache
        if: steps.cache-apt-lists.outputs.cache-hit == 'true'
        run: sudo cp -r ./cache/apt-lists/* /var/lib/apt/lists

      - name: Install Google Test From Cache
        if: steps.cache-google-tests.outputs.cache-hit == 'true'
        run: |
          sudo cp -r ./cache/gtest/lib/* /usr/lib
          sudo mkdir -p /usr/include/gtest
          sudo cp -r ./cache/gtest/include/* /usr/include/gtest

      - name: Install Config Cat From Cache
        if: steps.cache-config-cat.outputs.cache-hit == 'true'
        run: |
          sudo cp ./cache/configcat/lib/* /usr/lib
          sudo mkdir -p /usr/include/configcat
          sudo cp ./cache/configcat/include/* /usr/include/configcat/

      - name: Install Curl From Cache
        if: steps.cache-curl.outputs.cache-hit == 'true'
        run: |
          sudo cp ./cache/curl/lib/* /usr/lib
          sudo mkdir -p /usr/include/curl
          sudo cp ./cache/curl/include/* /usr/include/curl/

      - name: Install Hash Library From Cache
        if: steps.cache-hash-library.outputs.cache-hit == 'true'
        run: |
          sudo cp ./cache/hash-library/lib/* /usr/lib
          sudo mkdir -p /usr/include/hash-library
          sudo cp ./cache/hash-library/include/* /usr/include/hash-library/

      - name: Install Spdlog From Cache
        if: steps.cache-spdlog.outputs.cache-hit == 'true'
        run: |
          sudo cp ./cache/spdlog/lib/libspdlog* /usr/local/lib

          sudo mkdir -p /usr/local/lib/cmake/spdlog
          sudo cp -r ./cache/spdlog/lib/cmake/spdlog/* /usr/local/lib/cmake/spdlog/

          sudo mkdir -p /usr/local/lib/pkgconfig
          sudo cp ./cache/spdlog/lib/pkgconfig/spdlog* /usr/local/lib/pkgconfig/

          sudo cp -r ./cache/spdlog/include/spdlog* /usr/local/include

      - name: Install GCC From Cache
        if: steps.cache-gcc-latest.outputs.cache-hit == 'true'
        run: |
          sudo mkdir -p /usr/local/gcc-latest
          sudo cp -r ./cache/gcc-latest/* /usr/local/gcc-latest/
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/local/gcc-latest/bin/g++ 100
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/local/gcc-latest/bin/gcc 100
          sudo update-alternatives --install /usr/bin/gcov gcov /usr/local/gcc-latest/bin/gcov 100

      - name: Install dependencies
        if: steps.cache-apt-packages.outputs.cache-hit != 'true' || steps.cache-apt-lists.outputs.cache-hit != 'true' || steps.cache-google-tests.outputs.cache-hit != 'true' || steps.cache-config-cat.outputs.cache-hit != 'true' || steps.cache-curl.outputs.cache-hit != 'true' || steps.cache-hash-library.outputs.cache-hit != 'true' || steps.cache-gcc-latest.outputs.cache-hit != 'true' || steps.cache-spdlog.outputs.cache-hit != 'true'
        run: ./makefileDependencies.sh a

      - name: Install Testing Frameworks
        if: steps.cache-apt-packages.outputs.cache-hit == 'true' || steps.cache-apt-lists.outputs.cache-hit == 'true' || steps.cache-google-tests.outputs.cache-hit == 'true' || steps.cache-config-cat.outputs.cache-hit == 'true' || steps.cache-curl.outputs.cache-hit == 'true' || steps.cache-hash-library.outputs.cache-hit == 'true' || steps.cache-gcc-latest.outputs.cache-hit == 'true' || steps.cache-spdlog.outputs.cache-hit == 'true'
        run: sudo apt-get install libgmock-dev catch2 -y

      # Add any setup steps before running the `github/codeql-action/init` action.
      # This includes steps like installing compilers or runtimes (`actions/setup-node`
      # or others). This is typically only required for manual builds.
      # - name: Setup runtime (example)
      #   uses: actions/setup-example@v1

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: manual
          # If you wish to specify custom queries, you can do so here or in a config file.
          # By default, queries listed here will override any specified in a config file.
          # Prefix the list here with "+" to use these queries and those in the config file.

          # For more details on CodeQL's query packs, refer to: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
          # queries: security-extended,security-and-quality

      # If the analyze step fails for one of the languages you are analyzing with
      # "We were unable to automatically build your code", modify the matrix above
      # to set the build mode to "manual" for that language. Then modify this step
      # to build your code.
      # ℹ️ Command-line programs to run using the OS shell.
      # 📚 See https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idstepsrun
      - name: Make project
        run: make
        env:
          LD_LIBRARY_PATH: /usr/local/gcc-latest/lib64
          LIBRARY_PATH: /usr/local/gcc-latest/lib64
          PATH: /usr/local/gcc-latest/bin:${{ env.PATH }}

      - name: Ensure CodeQL TRAP directory exists
        if: always()
        run: |
          CODEQL_DB="$RUNNER_TEMP/codeql_databases/cpp"
          if [ -d "$CODEQL_DB" ]; then
            mkdir -p "$CODEQL_DB/trap/cpp/tarballs"
          fi

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{matrix.language}}'

      - name: Save Apt Packages Cache
        run: |
          sudo cp -r /var/cache/apt ./cache/apt-packages

      - name: Save Apt Lists Cache
        run: |
          sudo cp -r /var/lib/apt/lists ./cache/apt-lists

      - name: Save Google Test Cache
        run: |
          sudo cp -r /usr/lib/libgtest* ./cache/gtest/lib
          sudo cp -r /usr/include/gtest/* ./cache/gtest/include

      - name: Save Config Cat Cache
        run: |
          sudo cp /usr/lib/libconfigcat.a ./cache/configcat/lib
          sudo cp /usr/include/configcat/* ./cache/configcat/include

      - name: Save Curl Cache
        run: |
          sudo cp /usr/lib/libcurl.a ./cache/curl/lib
          sudo cp /usr/include/curl/* ./cache/curl/include

      - name: Save Hash Library Cache
        run: |
          sudo cp /usr/lib/libhash-library.a ./cache/hash-library/lib
          sudo cp /usr/include/hash-library/* ./cache/hash-library/include

      - name: Save Spdlog Cache
        run: |
          sudo cp /usr/local/lib/libspdlog* ./cache/spdlog/lib
          sudo cp -r /usr/local/lib/cmake/spdlog ./cache/spdlog/lib/cmake
          sudo cp /usr/local/lib/pkgconfig/spdlog* ./cache/spdlog/lib/pkgconfig
          sudo cp -r /usr/local/include/spdlog* ./cache/spdlog/include

      - name: Find latest GCC
        run: |
          latest_gcc=$(find /usr/local -maxdepth 1 -type d -name 'gcc-*' | sort -V | tail -n1)
          echo "LATEST_GCC=$latest_gcc" >> "$GITHUB_ENV"

      - name: Save GCC Cache
        run: |
          sudo cp -r "$LATEST_GCC"/* ./cache/gcc-latest

      - name: Give Read Access For Apt Folder
        run: sudo chown -R $USER:$USER ./cache/apt-packages/apt/archives/lock ./cache/apt-packages/apt/archives/partial ./cache/apt-lists/lists/lock ./cache/apt-lists/lists/partial
